<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0e27"/>
<title>Advanced Multi-LLM Trading System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0e27;
  --s1: #0d1b2e;
  --s2: #112240;
  --s3: #0a1628;
  --bd: #1e3a5f;
  --cyan: #00E5FF;
  --green: #00E676;
  --red: #FF1744;
  --orange: #FF6D00;
  --amber: #FFB300;
  --purple: #7C4DFF;
  --text: #E0F2FE;
  --muted: #546E7A;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
body { display: flex; flex-direction: column; max-width: 1200px; margin: 0 auto; }
#app { display: flex; flex-direction: column; height: 100vh; }
.hdr { background: linear-gradient(180deg, var(--s2), var(--bg)); padding: 16px; border-bottom: 1px solid var(--bd); }
.hdr-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.app-name { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.llm-status { display: flex; gap: 8px; flex-wrap: wrap; }
.llm-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px; border: 1px solid; white-space: nowrap; }
.badge-active { border-color: var(--green); color: var(--green); background: rgba(0, 230, 118, 0.1); }
.badge-inactive { border-color: var(--muted); color: var(--muted); background: rgba(84, 110, 122, 0.1); }
.tabs { display: flex; gap: 4px; padding: 0 16px; border-bottom: 1px solid var(--bd); flex-wrap: wrap; }
.tbtn { background: transparent; border: 1px solid transparent; border-radius: 8px; color: var(--muted); padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.tbtn.on { background: var(--s2); border-color: var(--cyan); color: var(--cyan); }
.content { flex: 1; overflow-y: auto; padding: 16px; }
.card { background: var(--s1); border: 1px solid var(--bd); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.section-title { font-size: 12px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 12px; color: var(--cyan); display: flex; align-items: center; gap: 8px; }
.chat-container { display: flex; flex-direction: column; height: 100%; }
.chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 10px; }
.message { border-radius: 10px; padding: 12px 14px; font-size: 13px; line-height: 1.6; animation: fadeUp 0.3s ease; }
.message.user { background: var(--s2); border: 1px solid var(--bd); margin-left: 40px; border-bottom-right-radius: 4px; color: var(--muted); }
.message.assistant { background: rgba(0, 229, 255, 0.08); border: 1px solid rgba(0, 229, 255, 0.2); margin-right: 20px; border-bottom-left-radius: 4px; }
.msg-header { font-size: 10px; font-weight: 700; color: var(--cyan); margin-bottom: 6px; text-transform: uppercase; display: flex; gap: 6px; flex-wrap: wrap; }
.model-tag { font-size: 9px; padding: 2px 6px; border-radius: 10px; background: rgba(0, 229, 255, 0.1); border: 1px solid rgba(0, 229, 255, 0.3); }
.confidence-badge { font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 700; }
.conf-high { background: rgba(0, 230, 118, 0.2); color: var(--green); }
.conf-mid { background: rgba(255, 179, 0, 0.2); color: var(--amber); }
.conf-low { background: rgba(255, 23, 68, 0.2); color: var(--red); }
.input-group { display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--bd); }
.input-area { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.chat-input { background: var(--s2); border: 1px solid var(--bd); border-radius: 10px; color: var(--text); padding: 10px 12px; font-size: 13px; font-family: 'Inter', system-ui; outline: none; resize: none; min-height: 40px; max-height: 80px; }
.chat-input:focus { border-color: var(--cyan); }
.send-btn { background: var(--cyan); border: none; border-radius: 10px; color: #000; font-weight: 700; padding: 10px 16px; cursor: pointer; transition: opacity 0.2s; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.options { display: flex; gap: 8px; flex-wrap: wrap; }
.option-btn { background: var(--s2); border: 1px solid var(--bd); border-radius: 6px; padding: 6px 10px; font-size: 11px; cursor: pointer; color: var(--text); transition: all 0.2s; }
.option-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-box { background: var(--s2); border: 1px solid var(--bd); border-radius: 10px; padding: 12px; text-align: center; }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
.stat-value { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--cyan); }
.model-selector { background: var(--s2); border: 1px solid var(--bd); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer; }
.response-meta { font-size: 11px; color: var(--muted); padding: 8px 10px; background: rgba(0, 0, 0, 0.2); border-radius: 8px; margin-top: 8px; border-left: 2px solid var(--cyan); }
.ensemble-breakdown { background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 10px; padding: 10px; margin-top: 8px; font-size: 11px; }
.provider-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(0, 229, 255, 0.1); }
.provider-row:last-child { border-bottom: none; }
.typing-indicator { display: flex; gap: 4px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.4s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.btn { border: none; border-radius: 8px; font-weight: 600; font-size: 13px; padding: 10px 16px; cursor: pointer; transition: all 0.2s; font-family: 'Inter', system-ui; }
.btn-primary { background: var(--cyan); color: #000; }
.btn-primary:hover { opacity: 0.9; }
.btn-secondary { background: var(--s2); border: 1px solid var(--bd); color: var(--text); }
.btn-danger { background: rgba(255, 23, 68, 0.1); color: var(--red); border: 1px solid var(--red); }
.fld { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
input, select, textarea { background: var(--s2); border: 1px solid var(--bd); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 12px; font-family: 'JetBrains Mono', monospace; outline: none; }
input:focus, select:focus { border-color: var(--cyan); }
.loading-spinner { text-align: center; color: var(--muted); padding: 20px; }
.spinner { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-row">
      <div>
        <div style="font-size: 11px; color: var(--cyan); font-family: 'JetBrains Mono'; letter-spacing: 1.5px; margin-bottom: 4px;">🚀 PRODUCTION</div>
        <div class="app-name">Advanced Multi-LLM System</div>
      </div>
      <div style="text-align: right;">
        <div style="font-size: 10px; color: var(--muted); margin-bottom: 6px;">ACTIVE MODELS</div>
        <div class="llm-status" id="llm-status"></div>
      </div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

<script>
const LS = k => { try { return localStorage.getItem(k) } catch { return null } };
const LSS = (k, v) => { try { localStorage.setItem(k, String(v || '')) } catch {} };

const S = {
  tab: 'ensemble',
  providers: {
    groq: {
      name: 'Groq',
      emoji: '⚡',
      model: 'llama-3.3-70b-versatile',
      priority: 1,
      speed: 'ultra-fast',
      color: '#FF6D00',
      active: !!LS('groqKey'),
      apiKey: LS('groqKey') || '',
      endpoint: 'https://api.groq.com/openai/v1/chat/completions',
    },
    gemini: {
      name: 'Gemini',
      emoji: '🔮',
      model: 'gemini-1.5-flash',
      priority: 2,
      speed: 'very-fast',
      color: '#4285F4',
      active: !!LS('geminiKey'),
      apiKey: LS('geminiKey') || '',
      endpoint: 'https://generativelanguage.googleapis.com/v1beta/models',
    },
    claude: {
      name: 'Claude',
      emoji: '🧠',
      model: 'claude-3-5-sonnet-20241022',
      priority: 3,
      speed: 'intelligent',
      color: '#9333EA',
      active: !!LS('claudeKey'),
      apiKey: LS('claudeKey') || '',
      endpoint: 'https://api.anthropic.com/v1/messages',
    },
    openrouter: {
      name: 'OpenRouter',
      emoji: '🌐',
      model: 'meta-llama/llama-3.1-405b-instruct:free',
      priority: 4,
      speed: 'standard',
      color: '#9333EA',
      active: !!LS('openrouterKey'),
      apiKey: LS('openrouterKey') || '',
      endpoint: 'https://openrouter.ai/api/v1/chat/completions',
    }
  },
  cache: JSON.parse(LS('cache') || '{}'),
  conversations: JSON.parse(LS('conversations') || '{"ensemble":[], "parallel":[], "consensus":[]}'),
  stats: JSON.parse(LS('stats') || '{"totalQueries": 0, "avgConfidence": 0, "totalCost": 0}'),
  method: 'ensemble',
  loading: false,
  selectedModels: ['groq', 'gemini', 'claude'],
};

const persist = () => {
  LSS('cache', JSON.stringify(S.cache));
  LSS('conversations', JSON.stringify(S.conversations));
  LSS('stats', JSON.stringify(S.stats));
};

class AccuracyScorer {
  scoreResponse(response, options = {}) {
    let score = 0;
    if (response.length > 150) score += 20;
    if (response.includes('However') || response.includes('Furthermore')) score += 15;
    if (/\d{1,3}[,.]?\d+/g.test(response)) score += 15;
    const lines = response.split('\n').length;
    if (lines > 3) score += 10;
    if (response.includes('**') || response.includes('1.') || response.includes('•')) score += 10;
    const positiveIndicators = ['clearly', 'definitely', 'proven', 'evidence', 'research'];
    const negativeIndicators = ['might', 'could', 'possibly', 'unclear', 'unknown'];
    const positiveCount = positiveIndicators.filter(w => response.toLowerCase().includes(w)).length;
    const negativeCount = negativeIndicators.filter(w => response.toLowerCase().includes(w)).length;
    score += Math.min(15, positiveCount * 3);
    score -= Math.min(10, negativeCount * 2);
    if (options.keywords) {
      const keywordMatches = options.keywords.filter(k => response.toLowerCase().includes(k.toLowerCase())).length;
      score += Math.min(20, keywordMatches * 5);
    }
    return Math.min(100, Math.max(0, score));
  }
  generateConfidenceLevel(scores) {
    const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
    if (avg >= 80) return { level: 'HIGH', color: 'var(--green)', emoji: '✅' };
    if (avg >= 60) return { level: 'MEDIUM', color: 'var(--amber)', emoji: '⚠️' };
    return { level: 'LOW', color: 'var(--red)', emoji: '❌' };
  }
}

const scorer = new AccuracyScorer();

class MultiLLMEngine {
  constructor() {
    this.activeProviders = [];
    this.responses = [];
    this.metrics = {};
  }

  getActiveProviders() {
    return Object.entries(S.providers)
      .filter(([_, p]) => p.active && p.apiKey)
      .map(([id]) => id);
  }

  async callGroq(messages) {
    if (!S.providers.groq.apiKey) throw new Error('Groq API key not set');
    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${S.providers.groq.apiKey}`,
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: messages,
          max_tokens: 2000,
          temperature: 0.7,
        }),
      });
      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.error?.message || 'Groq API error');
      }
      const data = await response.json();
      return {
        provider: 'groq',
        content: data.choices[0].message.content,
        tokens: data.usage.total_tokens,
        timestamp: new Date().toISOString(),
      };
    } catch (error) {
      throw new Error(`Groq: ${error.message}`);
    }
  }

  async callGemini(messages) {
    if (!S.providers.gemini.apiKey) throw new Error('Gemini API key not set');
    try {
      const contents = messages.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }],
      }));
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${S.providers.gemini.apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents,
            generationConfig: {
              maxOutputTokens: 2000,
              temperature: 0.7,
            },
          }),
        }
      );
      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.error?.message || 'Gemini API error');
      }
      const data = await response.json();
      return {
        provider: 'gemini',
        content: data.candidates[0].content.parts[0].text,
        tokens: data.usageMetadata?.totalTokenCount || 0,
        timestamp: new Date().toISOString(),
      };
    } catch (error) {
      throw new Error(`Gemini: ${error.message}`);
    }
  }

  async callClaude(messages) {
    if (!S.providers.claude.apiKey) throw new Error('Claude API key not set');
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': S.providers.claude.apiKey,
          'anthropic-version': '2023-06-01',
        },
        body: JSON.stringify({
          model: 'claude-3-5-sonnet-20241022',
          max_tokens: 2000,
          messages: messages,
        }),
      });
      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.error?.message || 'Claude API error');
      }
      const data = await response.json();
      return {
        provider: 'claude',
        content: data.content[0].text,
        tokens: data.usage.input_tokens + data.usage.output_tokens,
        timestamp: new Date().toISOString(),
      };
    } catch (error) {
      throw new Error(`Claude: ${error.message}`);
    }
  }

  async queryLLM(providerId, messages) {
    const cacheKey = `${providerId}|${JSON.stringify(messages).slice(0, 100)}`;
    if (S.cache[cacheKey]) {
      return S.cache[cacheKey];
    }
    let result;
    switch (providerId) {
      case 'groq':
        result = await this.callGroq(messages);
        break;
      case 'gemini':
        result = await this.callGemini(messages);
        break;
      case 'claude':
        result = await this.callClaude(messages);
        break;
      default:
        throw new Error(`Unknown provider: ${providerId}`);
    }
    S.cache[cacheKey] = result;
    return result;
  }

  async ensembleQuery(messages) {
    const active = this.getActiveProviders();
    if (active.length === 0) throw new Error('No LLM providers configured');
    const promises = active.map(id => 
      this.queryLLM(id, messages).catch(e => ({ 
        provider: id, 
        error: e.message 
      }))
    );
    const results = await Promise.all(promises);
    const validResults = results.filter(r => !r.error);
    if (validResults.length === 0) {
      throw new Error('All LLM calls failed: ' + results.map(r => r.error).join(', '));
    }
    const scored = validResults.map(r => ({
      ...r,
      score: scorer.scoreResponse(r.content),
    })).sort((a, b) => b.score - a.score);
    const bestResponse = scored[0];
    const avgScore = scored.reduce((sum, r) => sum + r.score, 0) / scored.length;
    return {
      method: 'ensemble',
      best: bestResponse,
      all: scored,
      confidence: scorer.generateConfidenceLevel(scored.map(r => r.score)),
      avgScore: avgScore.toFixed(1),
      consensus: this._generateConsensus(scored),
      timestamp: new Date().toISOString(),
    };
  }

  _generateConsensus(scored) {
    if (scored.length < 2) return scored[0].content;
    const summaries = scored.slice(0, 2).map((r, i) => {
      const sentences = r.content.split('.').filter(s => s.trim());
      return sentences[0] || r.content.slice(0, 100);
    });
    return summaries.join('. ') + '.';
  }
}

const engine = new MultiLLMEngine();

function renderTabs() {
  const tabs = [
    { id: 'ensemble', label: '🎯 Ensemble', desc: 'Best accuracy via voting' },
    { id: 'setup', label: '⚙️ Setup', desc: 'Configure LLM keys' },
  ];
  document.getElementById('tabs').innerHTML = tabs.map(t => 
    `<button class="tbtn${S.tab === t.id ? ' on' : ''}" onclick="S.tab='${t.id}';render()" title="${t.desc}">${t.label}</button>`
  ).join('');
}

function renderLLMStatus() {
  const status = document.getElementById('llm-status');
  if (!status) return;
  status.innerHTML = Object.entries(S.providers).map(([id, p]) => 
    `<div class="llm-badge ${p.active ? 'badge-active' : 'badge-inactive'}">
      ${p.emoji} ${p.name}
    </div>`
  ).join('');
}

function renderEnsembleChat() {
  const conversation = S.conversations.ensemble || [];
  const isLoading = S.loading;
  const messages = conversation.map((msg, i) => {
    if (msg.role === 'user') {
      return `<div class="message user">
        <div class="msg-header">👤 You</div>
        ${esc(msg.content)}
      </div>`;
    }
    const providers = msg.metadata?.all || [];
    const bestScore = msg.metadata?.best?.score || 0;
    const confidence = msg.metadata?.confidence || {};
    return `<div class="message assistant">
      <div class="msg-header">
        🤖 Ensemble
        <span class="model-tag">Multi-Model</span>
        <span class="confidence-badge conf-${confidence.level?.toLowerCase() || 'mid'}">
          ${confidence.emoji || '⚠️'} ${confidence.level || 'MEDIUM'}
        </span>
      </div>
      ${esc(msg.content)}
      <div class="response-meta">
        Avg Accuracy: ${msg.metadata?.avgScore || 'N/A'}% | Models: ${providers.length}
      </div>
      ${providers.length > 1 ? `
        <div class="ensemble-breakdown">
          <div style="font-weight: 700; margin-bottom: 6px;">📊 Model Breakdown</div>
          ${providers.map(p => `
            <div class="provider-row">
              <span>${S.providers[p.provider]?.emoji} ${S.providers[p.provider]?.name}</span>
              <span style="color: var(--cyan);">${p.score}%</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>`;
  }).join('');
  return `
    <div class="chat-container">
      <div class="chat-messages" id="chat-messages">
        ${conversation.length === 0 ? `
          <div style="text-align: center; padding: 40px; color: var(--muted);">
            <div style="font-size: 40px; margin-bottom: 12px;">🎯</div>
            <div style="font-size: 14px; line-height: 1.7;">
              Ensemble Mode: Query all LLMs in parallel<br/>
              Get the most accurate response through voting<br/>
              <span style="font-size: 12px; color: var(--text);">Start by typing a question below</span>
            </div>
          </div>
        ` : messages}
        ${isLoading ? `
          <div class="loading-spinner">
            <div class="typing-indicator">
              <div class="dot"></div>
              <div class="dot"></div>
              <div class="dot"></div>
            </div>
            <div style="margin-top: 8px; font-size: 12px;">Querying all models...</div>
          </div>
        ` : ''}
        <div id="messages-end"></div>
      </div>
      <div class="input-group">
        <div class="input-area">
          <textarea id="ensemble-input" class="chat-input" placeholder="Ask a question... (will query all active LLMs)" ${isLoading ? 'disabled' : ''}></textarea>
          <div class="options">
            <button class="option-btn" onclick="selectEnsemblePrompt('Analyze this topic')">📖 Analyze</button>
            <button class="option-btn" onclick="selectEnsemblePrompt('What are the pros and cons')">⚖️ Compare</button>
            <button class="option-btn" onclick="selectEnsemblePrompt('Explain this concept')">🎓 Explain</button>
            <button class="option-btn" onclick="selectEnsemblePrompt('What is the latest information')">📰 Latest</button>
          </div>
        </div>
        <button class="send-btn" onclick="sendEnsembleQuery()" ${isLoading ? 'disabled' : ''}>
          ${isLoading ? '⏳' : '🚀'}
        </button>
      </div>
    </div>
  `;
}

function renderSetupTab() {
  const setupHtml = Object.entries(S.providers).map(([id, provider]) => `
    <div class="card">
      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
        <span style="font-size: 20px;">${provider.emoji}</span>
        <div>
          <div style="font-weight: 700; font-size: 14px;">${provider.name}</div>
          <div style="font-size: 11px; color: var(--muted);">${provider.model}</div>
        </div>
      </div>
      <div class="fld">
        <div class="lbl">API Key</div>
        <input type="password" placeholder="Paste your API key..." value="${provider.apiKey}" 
          onchange="updateAPIKey('${id}', this.value)"/>
      </div>
      <div style="font-size: 11px; color: var(--muted); margin-top: 6px;">
        Status: <span style="color: ${provider.active ? 'var(--green)' : 'var(--muted)'};">${provider.active ? '✅ Active' : '❌ Inactive'}</span>
      </div>
    </div>
  `).join('');
  return `
    <div>
      <div class="card">
        <div class="section-title">🔑 LLM API Configuration</div>
        <div style="font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 12px;">
          All LLM providers below are FREE. Add your API keys to activate each model.
        </div>
      </div>
      ${setupHtml}
    </div>
  `;
}

function render() {
  renderTabs();
  renderLLMStatus();
  const content = document.getElementById('content');
  if (S.tab === 'ensemble') {
    content.innerHTML = renderEnsembleChat();
    setTimeout(() => {
      const input = document.getElementById('ensemble-input');
      if (input) input.focus();
    }, 50);
  } else if (S.tab === 'setup') {
    content.innerHTML = renderSetupTab();
  }
}

window.selectEnsemblePrompt = function(prompt) {
  const input = document.getElementById('ensemble-input');
  if (input) {
    input.value = prompt;
    input.focus();
  }
};

window.sendEnsembleQuery = async function() {
  const input = document.getElementById('ensemble-input');
  if (!input) return;
  const query = input.value.trim();
  if (!query) return;
  const userMessage = { role: 'user', content: query, timestamp: new Date().toISOString() };
  S.conversations.ensemble.push(userMessage);
  input.value = '';
  S.loading = true;
  render();
  try {
    const messages = S.conversations.ensemble.map(m => ({
      role: m.role,
      content: m.content,
    }));
    const result = await engine.ensembleQuery(messages);
    const assistantMessage = {
      role: 'assistant',
      content: result.best.content,
      metadata: result,
      timestamp: result.timestamp,
    };
    S.conversations.ensemble.push(assistantMessage);
    S.stats.totalQueries++;
    S.stats.avgConfidence = (S.stats.avgConfidence * (S.stats.totalQueries - 1) + parseFloat(result.avgScore)) / S.stats.totalQueries;
    persist();
    S.loading = false;
    render();
    setTimeout(() => {
      const end = document.getElementById('messages-end');
      if (end) end.scrollIntoView({ behavior: 'smooth' });
    }, 100);
  } catch (error) {
    const errorMessage = {
      role: 'assistant',
      content: `❌ Error: ${error.message}`,
      timestamp: new Date().toISOString(),
    };
    S.conversations.ensemble.push(errorMessage);
    S.loading = false;
    render();
  }
};

window.updateAPIKey = function(providerId, apiKey) {
  S.providers[providerId].apiKey = apiKey;
  S.providers[providerId].active = !!apiKey;
  LSS(`${providerId}Key`, apiKey);
  render();
};

function esc(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

render();
</script>
</body>
</html>
